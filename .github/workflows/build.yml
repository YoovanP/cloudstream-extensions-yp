name: Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Plugins
        run: |
          cd src
          chmod +x gradlew
          ./gradlew make makePluginsJson

      - name: Prepare Deployment
        run: |
          mkdir builds_dir
          # Copy artifacts to deployment directory
          cp src/**/build/*.cs3 builds_dir/ 2>/dev/null || echo "No .cs3 files found"
          cp src/build/plugins.json builds_dir/ 2>/dev/null || echo "No plugins.json found"
          cp src/repo.json builds_dir/ 2>/dev/null || echo "No repo.json found"

      - name: Deploy to Builds Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: builds_dir
          branch: builds
          token: ${{ secrets.GITHUB_TOKEN }}
          clean: true
          single-commit: true

name: Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Build Plugins
        run: |
          chmod +x gradlew
          ./gradlew make makePluginsJson

      - name: Prepare Deployment
        run: |
          mkdir builds_dir
          # Copy artifacts (using find to be safe with globs)
          find . -name "*.cs3" -exec cp {} builds_dir/ \;
          cp build/plugins.json builds_dir/ 2>/dev/null || echo "No plugins.json found"
          cp repo.json builds_dir/ 2>/dev/null || echo "No repo.json found"

      - name: Deploy to Builds Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: builds_dir
          branch: builds
          token: ${{ secrets.GITHUB_TOKEN }}
          clean: true
          single-commit: true

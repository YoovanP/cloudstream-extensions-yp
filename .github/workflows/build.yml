name: Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Checkout Builds Branch
        uses: actions/checkout@v4
        with:
          ref: "builds"
          path: "builds"
        continue-on-error: true # Creates it if it doesn't exist later

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Plugins
        run: |
          cd src
          chmod +x gradlew
          ./gradlew make makePluginsJson

          # Copy artifacts to builds folder
          mkdir -p ../builds
          cp **/build/*.cs3 ../builds/ || echo "No .cs3 files found"
          cp build/plugins.json ../builds/ || echo "No plugins.json found"

      - name: Push builds
        run: |
          cd builds
          # Force create builds branch if index doesn't exist
          if [ ! -d ".git" ]; then
             git init
             git remote add origin https://github.com/${{ github.repository }}
             git checkout -b builds
          fi
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          if [[ -n $(git status -s) ]]; then
            git commit -m "Build $GITHUB_SHA"
            git push origin builds --force
          else
            echo "No changes to push"
          fi

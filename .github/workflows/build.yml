name: Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Plugins
        run: |
          cd src
          chmod +x gradlew
          ./gradlew make makePluginsJson

      - name: Deploy to Builds Branch
        run: |
          mkdir builds_dir
          cd builds_dir
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Add remote with token for authentication
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          
          # Try to fetch existing builds branch
          if git fetch origin builds; then
            git checkout builds
          else
            git checkout --orphan builds
            git rm -rf .
          fi
          
          # Clean old builds and copy new ones
          rm -f *.cs3 plugins.json repo.json || true
          cp ../src/**/build/*.cs3 ./ 2>/dev/null || echo "No .cs3 files found"
          cp ../src/build/plugins.json ./ 2>/dev/null || echo "No plugins.json found"
          cp ../src/repo.json ./ 2>/dev/null || echo "No repo.json found"
          
          git add .
          if [[ -n $(git status -s) ]]; then
            git commit -m "Build $GITHUB_SHA"
            git push origin builds
          else
            echo "No changes to push"
          fi
